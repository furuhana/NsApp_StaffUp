<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工头像卡片生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- 新增：批量导出所需的库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <link rel="stylesheet" href="assets/style.css">
    <!-- 引入提取出的 Base64 字体数据 -->
    <script src="assets/fontData.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- 左侧：卡片列表/管理区 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="btn-batch" id="downloadAllBtn">下载全部</button>
                <button class="btn-add" id="addCardBtn">➕ 新增</button>
            </div>
            <div class="card-list" id="cardListContainer">
                <!-- 列表项将由 JS 动态渲染 -->
            </div>
        </aside>

        <!-- 右侧：预览与编辑区 -->
        <main class="preview-area">
            <div class="export-canvas" id="exportCanvas">
                <div class="card-base" id="layer1">
                    <div class="photo-container" id="photoWrap">
                        <div class="photo-image" id="avatarImage">
                        </div>
                        <!-- 悬浮操作栏 -->
                        <div class="photo-toolbar" id="photoToolbar">
                            <div class="tool-btn" onclick="event.stopPropagation(); zoomImage(0.1)" title="放大">➕</div>
                            <div class="tool-btn" onclick="event.stopPropagation(); zoomImage(-0.1)" title="缩小">➖</div>
                        </div>
                    </div>

                    <div class="text-layer" id="layer3">
                        <div class="text-element name-text" contenteditable="true" id="nameText">叫啥名字</div>
                        <div class="text-element title-text" contenteditable="true" id="titleText">什么工作的啊？</div>
                        <div class="text-element mbti-text" id="mbtiText" style="cursor: pointer;">(e人)</div>
                    </div>

                    <div class="mbti-toolbar" id="mbtiToolbar">
                        <div class="mbti-btn btn-i" onclick="setMbti('i')">I</div>
                        <div class="mbti-btn btn-e" onclick="setMbti('e')">E</div>
                    </div>
                </div>
            </div>

            <!-- 隐藏的图片输入框 -->
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </main>
    </div>

    <script src="assets/script.js"></script>
</body>

</html>
